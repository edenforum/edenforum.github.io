name: Deploy to GitHub Pages

on:
  # deploy on every push to main
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# permissions the GITHUB_TOKEN needs to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# only one Pages deploy at a time; let a newer push cancel an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # adapter-static writes the site here
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
